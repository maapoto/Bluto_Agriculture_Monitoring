<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timor-Leste Vegetation Index</title>

    <link rel="stylesheet"href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />


    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; }
        .leaflet-control-custom {
            background: white;
            padding: 5px;
            border-radius: 4px;
            border: 2px solid rgba(0,0,0,0.2);
        }
        #cloudCoverContainer {
            text-align: center;
            width: 150px;
        }
        .measure-handle {
            background: #ffffff !important;
            border: 2px solid #d9480f !important;
            border-radius: 50% !important;
            width: 7px !important;
            height: 7px !important;
            margin-left: -4px !important;
            margin-top: -4px !important;
            box-sizing: border-box;
        }
        .legend {
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        .legend h4 {
            margin: 0 0 5px;
        }
    </style>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
</head>
<body>
    <input type="date" id="datePicker">

    <div id="cloudCoverContainer" style="display: none;">
        <label for="cloudCoverSlider">Cloud Cover: <span id="cloudCoverValue">40</span>%</label>
        <input type="range" id="cloudCoverSlider" min="0" max="100" value="40" style="width: 100%;">
    </div>

    <div id="map"></div>

    
    <script>
       var map = L.map('map').setView([-8.53, 126.185], 14);

       // Create a new Leaflet control for the date picker
       var datePickerControl = new L.Control({position: 'topright'});

    var osm = L.tileLayer( 'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            attribution:'© OSM'
        }).addTo(map);
        var vegindexlink='https://services.sentinel-hub.com/ogc/wms/8c23cd13-b7ee-4580-a595-9218d6531720';
        //var vegindexlink='https://api.eu-1.planet.com/ogc/wmts/8c23cd13-b7ee-4580-a595-9218d6531720';
    var ndwi = L.tileLayer.wms( vegindexlink,
        {
            layers: '7_NDWI',
            format: 'image/png',
            tileSize: 128,
            transparent: true,
            version: '1.1.1',
            attribution: 'Sentinel Hub',
            maxcc: 40
        });

        ndwi.addTo(map);

        var ndvi = L.tileLayer.wms( vegindexlink,
        {
            layers: '3_NDVI',
            format: 'image/png',
            tileSize: 128,
            transparent: true,
            version: '1.1.1',
            attribution: 'Sentinel Hub',
            maxcc: 40
        });

        var moistureIndex = L.tileLayer.wms( vegindexlink,
        {
            layers: '5_MOISTURE-INDEX',
            format: 'image/png',
            tileSize: 128,
            transparent: true,
            version: '1.1.1',
            attribution: 'Sentinel Hub',
            maxcc: 40
        });
        var trueColor = L.tileLayer.wms( vegindexlink,
        {
            layers: '1_TRUE_COLOR',
            tileSize: 128,
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: 'Sentinel Hub',
            maxcc: 40
        });
        var falseColor = L.tileLayer.wms( vegindexlink,
        {
            layers: '2_FALSE_COLOR',
            tileSize: 128,
            format: 'image/png',
            transparent: true,
            version: '1.1.1',
            attribution: 'Sentinel Hub',
            maxcc: 40
        });

        datePickerControl.onAdd = function(map) {
            // Get the date picker element
            var datePicker = document.getElementById('datePicker');
            // Add a class for styling and prevent map interaction
            L.DomUtil.addClass(datePicker, 'leaflet-control-custom');
            L.DomEvent.disableClickPropagation(datePicker);
            return datePicker;
        };

        datePickerControl.addTo(map);

        var cloudCoverControl = new L.Control({position: 'topright'});
        cloudCoverControl.onAdd = function(map) {
            var container = document.getElementById('cloudCoverContainer');
            container.style.display = 'block'; // Make it visible
            L.DomUtil.addClass(container, 'leaflet-control-custom');
            L.DomEvent.disableClickPropagation(container);
            return container;
        };

        cloudCoverControl.addTo(map);

        var baseMaps = {
            "OpenStreetMap": osm
        };

        var overlayMaps = {
            "True Color": trueColor,
            "False Color": falseColor,
            "NDVI": ndvi,
            "NDWI": ndwi,
            "Moisture Index": moistureIndex,
        };

        L.control.layers(baseMaps, overlayMaps, { collapsed: true }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            position: 'topleft',
            edit: {
                featureGroup: drawnItems,
                remove: true
            },
            draw: {
                polyline: {
                    metric: true,
                    feet: false,
                    nautic: false,
                    shapeOptions: {
                        color: '#d9480f',
                        weight: 2.2,
                        opacity: 0.95,
                        lineCap: 'round',
                        lineJoin: 'round'
                    }
                },
                polygon: {
                    allowIntersection: false,
                    showArea: true,
                    shapeOptions: {
                        color: '#d9480f',
                        weight: 1.8,
                        fillColor: '#ff6b3d',
                        fillOpacity: 0.16
                    }
                },
                rectangle: false,
                circle: false,
                marker: false,
                circlemarker: false
            }
        });
        map.addControl(drawControl);

        map.on('draw:created', function (e) {
            var layer = e.layer;
            if (layer instanceof L.Polyline) {
                layer.setStyle({
                    color: '#d9480f',
                    weight: 2.2,
                    opacity: 0.95,
                    lineCap: 'round',
                    lineJoin: 'round'
                });
            }
            if (layer instanceof L.Polygon) {
                layer.setStyle({
                    color: '#d9480f',
                    weight: 1.8,
                    fillColor: '#ff6b3d',
                    fillOpacity: 0.16
                });
            }
            drawnItems.addLayer(layer);
        });

        map.on('draw:drawstart', function (e) {
            if (e.layerType === 'polyline') {
                map.getContainer().style.cursor = 'crosshair';
            }
        });

        map.on('draw:drawstop', function () {
            map.getContainer().style.cursor = '';
        });

        map.on('draw:editstart draw:editstop draw:deletestart draw:deletestop', function () {
            map.getContainer().style.cursor = '';
        });

        function updateAllLayers(params) {
            ndwi.setParams(params);
            ndvi.setParams(params);
            moistureIndex.setParams(params);
            trueColor.setParams(params);
            falseColor.setParams(params);
        }

        document
                .getElementById('datePicker')
                .addEventListener('change', function() {

            var selectedDate = this.value;
            updateAllLayers({
                time: selectedDate
            });
        });

        document
            .getElementById('cloudCoverSlider')
            .addEventListener('input', function() {

            var cloudCoverValue = this.value;
            document.getElementById('cloudCoverValue').innerText = cloudCoverValue;

            // Use 'change' event for less frequent updates, or 'input' for real-time
            // For now, we will update on every input change.
            updateAllLayers({
                maxcc: cloudCoverValue
            });
        });
        
        // --- Legend Control ---

        var legendControl = L.control({position: 'bottomright'});

        legendControl.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info legend');
            this._div.style.display = 'none'; // Initially hidden
            return this._div;
        };

        legendControl.addTo(map);

        function updateLegend(layerName, layerId) {
            var legendContainer = legendControl.getContainer();
            
            // Hide legend for layers that don't need one
            if (layerId === '1_TRUE_COLOR' || layerId === '2_FALSE_COLOR') {
                legendContainer.style.display = 'none';
                return;
            }

            var legendUrl = vegindexlink + '?SERVICE=WMS&REQUEST=GetLegendGraphic&LAYER=' + layerId + '&FORMAT=image/png&WIDTH=60&HEIGHT=200';
            console.log('Updating legend for layer:', layerName, 'with URL:', legendUrl, 'layerId:', layerId);
            legendContainer.innerHTML = '<h4>' + layerName + '</h4>' +
                                        '<img src="' + legendUrl + '" alt="Legend">';
            legendContainer.style.display = 'block';
        }

        map.on('overlayadd', function(e) {
            // e.name is the friendly name (e.g., "NDVI")
            // e.layer.wmsParams.layers is the WMS layer ID (e.g., "3_NDVI")
            updateLegend(e.name, e.layer.wmsParams.layers);
        });

        map.on('overlayremove', function(e) {
            // Find the topmost visible overlay layer that has a legend
            var activeLegendLayer = null;
            var layers = ["Moisture Index", "NDWI", "NDVI", "False Color", "True Color"]; // Order from top to bottom in control

            for (var i = 0; i < layers.length; i++) {
                var layerName = layers[i];
                if (map.hasLayer(overlayMaps[layerName])) {
                    activeLegendLayer = { name: layerName, layer: overlayMaps[layerName] };
                    break; // Found the topmost active layer
                }
            }
            if (activeLegendLayer) {
                updateLegend(activeLegendLayer.name, activeLegendLayer.layer.wmsParams.layers);
            } else {
                legendControl.getContainer().style.display = 'none'; // Hide if no legendable layers are active
            }
        });

        // Manually trigger legend for the default layer on load
        updateLegend("NDWI", "7_NDWI");
    </script>

    
</body>
</html>
